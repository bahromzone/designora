name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Ruff report
        continue-on-error: true
        run: ruff check .
      - name: Black report
        continue-on-error: true
        run: black --check .
      - name: Pytest
        env:
          ENVIRONMENT: development
          DATABASE_URL: "sqlite+pysqlite:///:memory:"
          SECRET_KEY: ci-secret
          SESSION_SECRET_KEY: ci-session
          JWT_SECRET_KEY: ci-jwt
          MAIL_USERNAME: ci@example.com
          MAIL_PASSWORD: ci-pass
          MAIL_FROM: ci@example.com
          MAIL_PORT: "587"
          MAIL_SERVER: smtp.example.com
          RECAPTCHA_SECRET_KEY: ci-recaptcha
        run: pytest -q --tb=short
  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test:run
      - run: npm run coverage
      - run: npm run build
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t designora-backend ./backend
      - run: docker build -t designora-frontend ./frontend
