name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Ruff (lint)
        run: ruff check . --output-format=github
      - name: Black (format check)
        run: black --check .
      - name: Pytest (+ coverage, includes assignment-to-portfolio E2E)
        env:
          ENVIRONMENT: development
          DATABASE_URL: "sqlite+pysqlite:///:memory:"
          SECRET_KEY: ci-secret
          SESSION_SECRET_KEY: ci-session
          JWT_SECRET_KEY: ci-jwt
          MAIL_USERNAME: ci@example.com
          MAIL_PASSWORD: ci-pass
          MAIL_FROM: ci@example.com
          MAIL_PORT: "587"
          MAIL_SERVER: smtp.example.com
          RECAPTCHA_SECRET_KEY: ci-recaptcha
        run: pytest
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: ignore

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier (format check)
        run: npm run format:check
      - name: Vitest
        run: npm run test:run
      - name: Build
        shell: bash
        run: |
          set +e
          npm run build 2>&1 | tee /tmp/vite-build.log
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then
            message=$(tail -n 30 /tmp/vite-build.log | tr '\n' ' ' | sed 's/%/%25/g; s/\r/%0D/g')
            echo "::error title=Vite build failed::$message"
            exit "$code"
          fi

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t designora-backend ./backend
      - name: Build frontend image
        run: docker build -t designora-frontend ./frontend
