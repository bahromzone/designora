name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Ruff
        run: ruff check . --output-format=github
      - name: Black
        run: >-
          black --check app tests
          --exclude '(app/alembic|app/routers/discovery\.py|app/routers/notifications\.py|app/routers/media\.py|app/routers/notes\.py|app/models/reminder_preference\.py|app/models/lesson\.py|app/models/lesson_progress\.py|app/models/note\.py|tests/test_global_search_api\.py|tests/test_course_filters_3_12\.py|tests/test_reminder_preferences\.py|tests/test_video_player_3_16\.py|tests/test_notes_bookmarks_3_18\.py)'
      - name: Pytest
        env:
          ENVIRONMENT: development
          DATABASE_URL: "sqlite+pysqlite:///:memory:"
          SECRET_KEY: ci-secret
          SESSION_SECRET_KEY: ci-session
          JWT_SECRET_KEY: ci-jwt
          MAIL_USERNAME: ci@example.com
          MAIL_PASSWORD: ci-pass
          MAIL_FROM: ci@example.com
          MAIL_PORT: "587"
          MAIL_SERVER: smtp.example.com
          RECAPTCHA_SECRET_KEY: ci-recaptcha
        run: pytest

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier
        run: npm run format:check
      - name: Vitest
        run: npm run test:run
      - name: Critical coverage
        run: >-
          npm run coverage --
          --coverage.include=src/lib/roadmapMetrics.js
          --coverage.thresholds.lines=70
          --coverage.thresholds.functions=70
      - name: Vite build
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t designora-backend ./backend
      - run: docker build -t designora-frontend ./frontend
