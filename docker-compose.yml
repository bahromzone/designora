# ===== Designora — to'liq lokal stek =====
# Ishga tushirish:  docker compose up --build
# Frontend:  http://localhost:5173
# Backend:   http://localhost:8000  (docs: /docs)

services:
  db:
    image: postgres:16-alpine
    container_name: designora-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-designora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-designora}
      POSTGRES_DB: ${POSTGRES_DB:-designora}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-designora}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: designora-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: designora-backend
    env_file:
      - ./backend/.env
    environment:
      # Compose ichida db/redis xizmat nomlari orqali ulanadi
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-designora}:${POSTGRES_PASSWORD:-designora}@db:5432/${POSTGRES_DB:-designora}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    container_name: designora-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
