server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location ~* \.(?:svg|webp|avif|png|jpg|jpeg|woff2)$ {
    expires 30d;
    add_header Cache-Control "public, stale-while-revalidate=86400";
  }

  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_types text/css application/javascript application/json application/manifest+json image/svg+xml;
  gzip_min_length 1024;
}
